name: Publicar artigo no WordPress

# Botão manual: aba Actions → "Publicar artigo no WordPress" → Run workflow.
on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Arquivo do artigo (ex.: blog/creatina-engorda.html)'
        required: true
        type: string
      status:
        description: 'Publicar direto ou deixar como rascunho?'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - publish

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Publicar
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          INPUT_FILE: ${{ inputs.file }}
          INPUT_STATUS: ${{ inputs.status }}
        run: node scripts/publish-to-wp.mjs
